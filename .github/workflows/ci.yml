# GitHub Actions CI gate — the server-side, unbypassable layer. One `ci` check runs the repo's
# components; branch protection (protect-main.sh) requires it green before merge. This repo is
# backend-only, so only the Backend job + setup-java are emitted (see .conventions/templates/ci.yml
# for the multi-component reference). → .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        if: ${{ hashFiles('pom.xml') != '' }}
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Backend — Spotless + full tests (the ArchUnit / JMolecules / Modulith tests run here).
      - name: Backend
        if: ${{ hashFiles('pom.xml') != '' }}
        run: ./mvnw -B -ntp spotless:check verify
