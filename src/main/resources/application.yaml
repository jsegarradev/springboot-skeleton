spring:
  application:
    name: skeleton
  # Liquibase owns the schema; JPA never generates DDL (springboot.md §7).
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  # Default datasource = the real engine (PostgreSQL), env-driven (springboot.md §7). `make run` supplies
  # SPRING_DATASOURCE_* from compose (db container); `make dev`/prod supply them from the host or the
  # orchestrator. The localhost defaults let `make dev` (compose db published on :5432) just work. H2 is
  # test-only (see src/test/resources/application.yaml) and never backs a running app.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:app}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
