openapi: 3.0.3
info:
  title: Skeleton API
  version: 0.0.1
  description: >-
    Contract-first source of truth (springboot.md §6). The OpenAPI generator produces the API
    interfaces + model contracts under adapter/in/contracts; controllers implement the interfaces and
    mappers turn generated contract ↔ domain. Schemas end ...RequestBody / ...ResponseBody so the
    suffix carries the request/response direction.
paths:
  /dummy:
    get:
      operationId: getDummy
      tags:
        - dummy
      summary: Walking-skeleton slice — returns the value read from the seeded DB row.
      responses:
        '200':
          description: The dummy value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DummyResponseBody'
components:
  schemas:
    DummyResponseBody:
      type: object
      description: The dummy value served by GET /dummy.
      properties:
        value:
          type: string
      required:
        - value
