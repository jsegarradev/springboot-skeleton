spring:
  application:
    name: skeleton
  # Liquibase owns the schema; JPA never generates DDL (springboot.md §7).
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  # Dev/test stand-in: H2 in PostgreSQL compatibility mode (the prod engine's mode).
  datasource:
    url: jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
