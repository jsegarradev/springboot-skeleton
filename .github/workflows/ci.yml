# GitHub Actions CI gate — the server-side, unbypassable layer. One `ci` check runs whichever
# components the repo holds; branch protection (protect-main.sh) requires it green before merge.
# → .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      # Backend — Spotless + full tests (the ArchUnit / JMolecules / Modulith tests run here).
      - name: Backend
        if: ${{ hashFiles('pom.xml') != '' }}
        run: ./mvnw -B -ntp spotless:check verify

      # Frontend — lint + type-check + unit tests.
      - name: Frontend
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        run: |
          npm ci
          npx eslint .
          npx tsc -p tsconfig.app.json --noEmit
          npx ng test --watch=false
